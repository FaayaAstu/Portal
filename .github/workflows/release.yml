name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: true
        default: 'v-dev'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Mocks
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Generate Database Migrations Schema
        run: flutter pub run drift_dev schema generate drift_schemas/ test/generated_migrations/

      - name: Configure Keystore Signing
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/my-release-key.jks
          echo "storeFile=../my-release-key.jks" >> android/local.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Build Release APKs
        run: |
          # Build universal APK first
          flutter build apk --release
          # Rename/save it temporarily
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/app-release.apk.temp
          # Build split APKs
          flutter build apk --release --split-per-abi
          # Restore the universal APK
          mv build/app/outputs/flutter-apk/app-release.apk.temp build/app/outputs/flutter-apk/app-release.apk

      - name: Generate Release Notes
        env:
          TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
        run: python3 .github/scripts/generate_release_notes.py

      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: release_notes.md
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
